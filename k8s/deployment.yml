apiVersion: apps/v1
kind: Deployment
metadata:
  name: flip-url-shortener
  labels:
    app: flip-url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flip-url-shortener
  template:
    metadata:
      labels:
        app: flip-url-shortener
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: flip-url-shortener
        image: mrakin/flip-url-shortener:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-svc:5432/shortener
        - name: APP_URL_LIMIT
          value: "20000"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flip-url-shortener
spec:
  selector:
    app: flip-url-shortener
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
